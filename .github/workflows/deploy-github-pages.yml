name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute app version
        id: app_version
        run: |
          python3 scripts/compute_app_version.py \
            --config version.json \
            --github-output "$GITHUB_OUTPUT"

      - name: Generate cache token
        id: cache_token
        run: |
          TOKEN="$(date -u +%Y%m%d%H%M%S)-${GITHUB_SHA::7}"
          echo "value=${TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Apply cache token to app shell assets
        run: |
          python3 scripts/update_cache_tokens.py \
            --token "${{ steps.cache_token.outputs.value }}" \
            --app-version "${{ steps.app_version.outputs.version }}"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static artifact
        run: |
          test -d public
          if [ -f CNAME ]; then
            cp CNAME public/CNAME
          fi
          touch public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
